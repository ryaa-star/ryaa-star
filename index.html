<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rupal Arya</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0a0a0a;
  font-family:'Syne',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

#cursor{
  position:fixed;
  width:14px;
  height:14px;
  background:#f97316;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}

canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

#hero{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 6vw;
}

.tag{
  font-family:'Syne Mono',monospace;
  font-size:0.7rem;
  letter-spacing:0.25em;
  color:#f97316;
  margin-bottom:2rem;
}

h1{
  font-weight:800;

  font-size: clamp(5rem,14vw,13rem);
line-height:0.92;
  color:#f5f5f5;
}

h1 span{
  color:#f97316;
}

.subtitle{
  margin-top:2.5rem;
  font-family:'Syne Mono',monospace;
  font-size:clamp(0.85rem,1.5vw,1rem);
  color:rgba(245,245,245,0.4);
}

#typing{
  color:#f97316;
  border-right:2px solid #f97316;
  padding-right:4px;
  animation:blink 0.7s infinite;
}

@keyframes blink{
  50%{ border-color:transparent; }
}

.cta-row{
  margin-top:3rem;
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
}

.btn{
  padding:0.75rem 2rem;
  font-weight:700;
  font-size:0.85rem;
  letter-spacing:0.05em;
  text-transform:uppercase;
  text-decoration:none;
  transition:0.2s ease;
}

.primary{
  background:#f97316;
  color:#0a0a0a;
}

.primary:hover{
  transform:translateY(-3px);
}

.secondary{
  border:1px solid rgba(255,255,255,0.3);
  color:#f5f5f5;
}

.secondary:hover{
  border-color:#f97316;
  color:#f97316;
}

.badge{
  position:absolute;
  top:2rem;
  right:6vw;
  font-family:'Syne Mono',monospace;
  font-size:0.65rem;
  letter-spacing:0.15em;
  color:rgba(245,245,245,0.4);
}


</style>
</head>

<body>

<div id="cursor"></div>
<canvas id="canvas"></canvas>

<section id="hero">

  <div class="badge">AVAILABLE FOR OPPORTUNITIES</div>

  <p class="tag">// frontend engineer · mca student</p>

  <h1>
    Rupal<br>
    <span>Arya.</span>
  </h1>

  <p class="subtitle">
    I build <span id="typing"></span>
  </p>

  <div class="cta-row">
    <a href="#" class="btn primary">See my work</a>
    <a href="#" class="btn secondary">Get in touch</a>
  </div>

</section>

<script>

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e)=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});


const words = [
  "interfaces that feel alive.",
  "experiences, not just pages.",
  "creative frontend magic.",
  "things people love to use."
];

let wordIndex = 0;
let charIndex = 0;
let deleting = false;
const typing = document.getElementById("typing");

function typeEffect(){
  const current = words[wordIndex];

  if(!deleting){
    typing.textContent = current.slice(0, charIndex++);
    if(charIndex > current.length){
      deleting = true;
      setTimeout(typeEffect,1500);
      return;
    }
  } else {
    typing.textContent = current.slice(0, charIndex--);
    if(charIndex < 0){
      deleting = false;
      wordIndex = (wordIndex + 1) % words.length;
    }
  }

  setTimeout(typeEffect, deleting ? 40 : 70);
}

setTimeout(typeEffect,1000);


const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];

document.addEventListener("mousemove",(e)=>{
  for(let i=0;i<2;i++){
    particles.push({
      x:e.clientX,
      y:e.clientY,
      size:Math.random()*3+1,
      speedY:Math.random()*-2,
      life:1
    });
  }
});

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,index)=>{
    p.y += p.speedY;
    p.life -= 0.03;

    if(p.life <= 0){
      particles.splice(index,1);
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle = "rgba(249,115,22,"+p.life+")";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
