<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tracker</title>
  <link rel="stylesheet" href="counter.css" />
</head>
<body>

  <div class="toast" id="toast">💧 Stay Hydrated!</div>

  <div class="container">
    <h1>Daily Tracker</h1>
    <h2>Stay Hydrated</h2>

    <div class="glass-wrap">
      <div class="glass-rim"></div>
      <div class="glass-outer">
        <div class="water" id="water"></div>
      </div>
    </div>

    <span id="value">0</span>
    <p class="goal-label">goal = 8 glasses</p>

    <div class="btn-row">
      <button class="btn" id="btnDecrease">−</button>
      <button class="btn" id="btnReset">reset</button>
      <button class="btn" id="btnIncrease">+</button>
    </div>
  </div>

  <script src="counter.js"></script>
</body>
</html>
